<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>422 — XimTier</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0B132D">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Pretendard",system-ui,sans-serif;background:#0B132D;color:#e6e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{max-width:560px;text-align:center}
    .code{font-family:"JetBrains Mono",monospace;font-size:14px;letter-spacing:0.3em;color:#F59E0B}
    h1{font-size:96px;font-weight:800;margin:18px 0;letter-spacing:-0.03em;background:linear-gradient(135deg,#2563EB,#00C8C8);-webkit-background-clip:text;background-clip:text;color:transparent}
    p{font-size:17px;color:#a7b1c7;line-height:1.6;margin-bottom:32px}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{padding:14px 22px;border-radius:999px;font-weight:600;font-size:14px;text-decoration:none;transition:transform .15s}
    .btn:hover{transform:translateY(-1px)}
    .btn-grad{background:linear-gradient(135deg,#2563EB,#00C8C8);color:#fff;box-shadow:0 8px 24px -8px rgba(37,99,235,.55)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">// ERROR / 422</div>
    <h1>422</h1>
    <p>제출 내용이 검증을 통과하지 못했습니다.<br>필수 항목을 모두 채우고 다시 시도해 주세요.</p>
    <div class="btns">
      <a href="/ko" class="btn btn-grad">홈으로</a>
    </div>
  </div>
</body>
</html>
