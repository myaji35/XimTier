en:
  privacy_page:
    eyebrow: Privacy Policy
    h1: Privacy Policy
    lead: "Last updated: 2026-05-13. XimTier complies with Korea PIPA and EU GDPR."
    sections:
      - title: "1. Information We Collect"
        body: |
          XimTier collects the following information to provide its services.
          - Demo requests: name, email, company, role, industry, data description, optional file, preferred time
          - Contact inquiries: name, email, company, industry, message
          - IR downloads: name, email, company, role
          - Auto-collected: access logs (IP, browser, page views — cookieless analytics)
      - title: "2. Purpose of Collection"
        body: |
          - Responding to demo requests and inquiries; scheduling
          - Sending IR deck download links
          - Anonymous statistical analysis for service improvement
          - Legal compliance (e-commerce law, information & communications network act)
      - title: "3. Retention Period"
        body: |
          - Demo / inquiry: 1 year after meeting or until user requests deletion
          - IR download token: 24 hours after issuance (v1.5)
          - Access logs: 90 days (Plausible anonymous stats retained longer)
      - title: "4. Third-party Sharing"
        body: |
          XimTier does not share personal information with third parties, except:
          - Required by law or investigation
          - Service operation processing (Postmark/SendGrid for email — announced after domain confirmation)
      - title: "5. User Rights"
        body: |
          You may exercise the following rights at any time.
          - Access, correct, or delete your personal information
          - Withdraw consent and stop processing
          - GDPR additional rights (EU residents): data portability, object to automated decisions
          Contact: contact@ximtier.io
      - title: "6. Cookie Policy"
        body: |
          XimTier uses only the following cookies:
          - Essential: Devise session cookie (login)
          - Analytics: Plausible (cookieless — activated after domain confirmation, no personal identification)
          No tracking or advertising cookies.
      - title: "7. Security Measures"
        body: |
          - In transit: TLS 1.2/1.3 (when HTTPS active)
          - At rest: PII encryption review (v2)
          - Access control: Admin role separation, Rack::Attack rate limit
      - title: "8. Officer + Contact"
        body: |
          - Privacy Officer: Kang Seung-sik (CTO)
          - Contact: contact@ximtier.io
          - Dispute resolution: Korea PIPC (privacy.go.kr) / EU local DPA

  terms_page:
    eyebrow: Terms of Service
    h1: Terms of Service
    lead: "Last updated: 2026-05-13. These terms apply when using XimTier."
    sections:
      - title: "1. Service Overview"
        body: |
          XimTier is a Post-LLM Decision Intelligence platform.
          It helps non-experts make mathematically verifiable decisions within 5 minutes
          across data sovereignty, regulated industries, and Reverse What-If domains.
      - title: "2. Eligibility"
        body: |
          - 19+ years old or a legal entity
          - Consented to these terms and the privacy policy
          - Located in Korea or a GDPR-compliant jurisdiction
      - title: "3. Account + Data"
        body: |
          - Demo request auto-creates your account. Change the temporary password after first login.
          - Uploaded data files are accessed only by XimTier ops for demo preparation.
          - You may request account + data deletion at any time.
      - title: "4. Prohibited Actions"
        body: |
          - Identity theft
          - Disrupting service operation (DoS, abuse)
          - Uploading malicious code
          - Unauthorized access to XimTier systems
      - title: "5. Liability Limits"
        body: |
          - Demo results are clearly marked as "example data". Direct use for real decisions is at the user's risk.
          - Production deployments are fine-tuned on customer data under a separate SLA contract.
      - title: "6. Terms Changes"
        body: |
          - 7-day notice on site for any change
          - Major changes will be emailed to your registered address
      - title: "7. Dispute Resolution"
        body: |
          - Governed by the laws of the Republic of Korea
          - Jurisdiction: Seoul Central District Court
          - Non-Korean users: ICC arbitration available (preserving EU GDPR Art. 79 rights)
