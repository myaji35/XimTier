ko:
  problem:
    eyebrow: 문제
    h1: ChatGPT · Claude · Gemini는 기업 의사결정의 3가지를 풀지 못한다
    lead: LLM 첫 도입 웨이브가 끝났다. "그럴듯한 답"으로는 진짜 의사결정을 못 한다 — 기업이 깨닫기 시작했다.
    cards:
      data_sovereignty:
        icon: lock
        eyebrow: 문제 1
        title: 데이터 주권 — 기업 내부 데이터를 LLM에 올릴 수 없다
        body: 삼성·현대·LG는 ChatGPT 내부 사용을 금지했다. 의료·금융·공공 산업은 LLM 사용 자체가 규제 위반이다. OpenAI가 온프레미스를 팔기 시작했지만 중소기업이 쓸 수 있는 가격·복잡성이 아니다.
        quote: 삼성 반도체 불량률 데이터를 OpenAI 서버에 보낼 의사결정자는 없다.
        stat_value: "85%"
        stat_label: 글로벌 기업이 자사 데이터의 퍼블릭 LLM 입력 금지 정책 보유
      numeric_calc:
        icon: calculator
        eyebrow: 문제 2
        title: 수치 계산 한계 — LLM은 통계를 설명할 뿐, 계산하지 않는다
        body: Transformer 아키텍처는 다음 토큰을 예측하는 모델이다. 회귀 계수도, SHAP 값도, Reverse What-If 최적화도 수학적으로 보장하지 않는다. "그럴듯한 숫자"를 출력할 뿐이다.
        quote: LLM이 답을 내더라도 그건 추정이지 계산이 아니다. 공장 라인은 추정으로 못 멈춘다.
        stat_value: "75%"
        stat_label: "Gartner 2025: 기업 Generative AI 도입의 기대 미달 결과"
      regulation:
        icon: scale
        eyebrow: 문제 3
        title: 규제 의무 — EU AI Act · 한국 AI 기본법이 설명 가능한 AI를 법제화
        body: 의료 진단, 금융 신용평가, 공공 정책 결정은 XAI(설명 가능한 AI)를 법적으로 요구하기 시작했다. LLM 블랙박스로는 규제 통과 불가능. SHAP 기반 수학적 근거가 필수다.
        quote: EU AI Act 2026 시행 — 고위험 AI는 의사결정 근거를 수학적으로 제시해야 한다.
        stat_value: 글로벌
        stat_label: EU AI Act · 한국 AI 기본법 · 미국 AI Bill of Rights 동시 시행 중
