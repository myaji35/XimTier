          - "제조·행정·의료 현장 데이터 프로젝트 직접 수행"
          - "'비전문가가 못 쓰는 AI 툴의 답답함' 직접 경험한 당사자"
          - "XimTier 핵심 알고리즘 컨셉 설계"
          - "투자자·고객 네트워크 보유"
      cto:
        initial: "강"
        name: 강승식
        role: CTO & 공동창업자
        bullets:
          - "소프트웨어 아키텍처 및 AI 시스템 설계 전문"
          - "10개 SaaS 동시 개발 경험 — 빌드 속도 검증됨"
          - "Vibe Coding 기반 빠른 산업별 확장 구현"
          - "Claude Code · Harness CI/CD · MCP 통합 능숙"
          - "홈랩 + 클라우드 하이브리드 인프라 운영"
