    strengths:
      problem_owner:
        title: 문제 당사자
        body: CEO·CTO 모두 비전문가 AI 툴의 한계를 경험. 고객의 고통을 코드로 해결한다.
      lean:
        title: 2인 코어 + AI 협업
        body: Vibe Coding·Claude Code 활용으로 5명 팀 수준의 산출물과 속도.
      advisors:
        title: 어드바이저 모집 중
        body: 산업 도메인 전문가 + 해외 진출 경험자 + VC 네트워크 어드바이저 목표.
