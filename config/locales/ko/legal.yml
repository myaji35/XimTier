ko:
  privacy_page:
    eyebrow: 개인정보처리방침
    h1: 개인정보처리방침
    lead: "최종 업데이트: 2026-05-13. XimTier는 한국 개인정보보호법(PIPA)과 EU GDPR을 준수합니다."
    sections:
      - title: "1. 수집하는 정보"
        body: |
          XimTier는 서비스 제공을 위해 다음 정보를 수집합니다.
          - 데모 신청 시: 이름, 이메일, 회사, 직책, 산업, 데이터 설명, 첨부 파일(선택), 희망 일정
          - 문의 시: 이름, 이메일, 회사, 산업, 문의 내용
          - IR 자료 다운로드 시: 이름, 이메일, 회사, 직책
          - 자동 수집: 접속 로그(IP, 브라우저, 페이지 PV — cookieless 분석)
      - title: "2. 수집 목적"
        body: |
          - 데모 신청·문의 응대 및 일정 조율
          - IR 자료 다운로드 링크 발송
          - 서비스 개선을 위한 익명 통계 분석
          - 법령 준수 (전자상거래법, 정보통신망법)
      - title: "3. 보유 기간"
        body: |
          - 데모 신청·문의: 미팅 종료 후 1년 또는 사용자 삭제 요청 시까지
          - IR 다운로드 토큰: 발급 후 24시간 (만료 후 폐기, v1.5 적용 예정)
          - 접속 로그: 90일 (Plausible 익명 통계만 장기 보관)
      - title: "4. 제3자 제공"
        body: |
          XimTier는 사용자의 개인정보를 제3자에게 제공하지 않습니다.
          단, 다음 경우는 예외입니다.
          - 법령 또는 수사기관 요청 시
          - 서비스 운영을 위한 외주 처리 (Postmark/SendGrid 등 메일 발송 — 도메인 확정 후 별도 공지)
      - title: "5. 사용자 권리"
        body: |
          사용자는 언제든지 다음 권리를 행사할 수 있습니다.
          - 개인정보 열람·정정·삭제 요청
          - 처리 중지 및 수집 동의 철회
          - GDPR 추가 권리(EU 거주자): 데이터 이전, 자동 의사결정 거부
          요청: contact@ximtier.io
      - title: "6. 쿠키 정책"
        body: |
          XimTier는 다음 쿠키만 사용합니다.
          - 필수: Devise 세션 쿠키 (로그인 유지)
          - 분석: Plausible (cookieless — 도메인 확정 후 활성, 개인 식별 불가)
          추적·광고 쿠키는 사용하지 않습니다.
      - title: "7. 보안 조치"
        body: |
          - 전송 구간: TLS 1.2/1.3 암호화 (HTTPS 활성 시)
          - 저장 구간: PII 별도 암호화 검토 (v2 적용 예정)
          - 접근 제한: Admin 권한 분리, Rack::Attack 레이트리미트
      - title: "8. 책임자 + 연락처"
        body: |
          - 개인정보보호책임자: 강승식 (CTO)
          - 연락처: contact@ximtier.io
          - 분쟁 조정: 개인정보보호위원회 (privacy.go.kr)

  terms_page:
    eyebrow: 이용약관
    h1: 이용약관
    lead: "최종 업데이트: 2026-05-13. 본 약관은 XimTier 서비스 이용 시 적용됩니다."
    sections:
      - title: "1. 서비스 소개"
        body: |
          XimTier는 Post-LLM Decision Intelligence 플랫폼입니다.
          데이터 주권, 규제 산업, Reverse What-If 영역에서 비전문가도 5분 안에
          수학적으로 검증 가능한 의사결정을 내릴 수 있도록 지원합니다.
      - title: "2. 이용 자격"
        body: |
          - 만 19세 이상 또는 법인
          - 본 약관과 개인정보처리방침에 동의한 자
          - 한국 또는 GDPR 준수 가능한 지역의 사용자
      - title: "3. 계정 + 데이터"
        body: |
          - 데모 신청 시 자동 가입됩니다. 임시 비밀번호로 로그인 후 변경 권장
          - 업로드한 데이터 파일은 XimTier 운영팀이 데모 준비 목적으로만 열람
          - 사용자는 언제든지 계정 + 데이터 삭제를 요청할 수 있습니다
      - title: "4. 금지 행위"
        body: |
          - 타인의 정보 도용
          - 서비스 운영 방해 (DoS, 어뷰즈)
          - 악성코드 업로드
          - XimTier 시스템 무단 침입·접근
      - title: "5. 책임 제한"
        body: |
          - 데모 결과는 "예시 데이터"임을 명시하며 실제 의사결정에 직접 사용 시 책임은 사용자에게 있음
          - 실제 도입 시 고객 데이터로 파인튜닝 후 별도 SLA 계약 체결
      - title: "6. 약관 변경"
        body: |
          - 약관 변경 시 7일 전 사이트 공지
          - 중대 변경은 가입 이메일로 별도 안내
      - title: "7. 분쟁 해결"
        body: |
          - 대한민국법 적용
          - 관할: 서울중앙지방법원
          - 한국 외 사용자: ICC 중재 가능 (EU GDPR Art. 79 권리 보존)
