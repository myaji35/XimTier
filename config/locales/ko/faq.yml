ko:
  faq:
    section_eyebrow: 자주 묻는 질문
    section_title: 도입 결정 전 자주 듣는 질문 6가지
    items:
      - q: 우리 회사 데이터를 외부에 보내지 않아도 되나요?
        a: "네. XimTier는 온프레미스 100% 배포를 기본으로 합니다. 모든 학습·추론·SHAP 계산이 고객사 인프라(자체 서버 또는 VPC) 안에서 끝납니다. 데이터가 XimTier 클라우드로 전송되지 않습니다."
      - q: LLM(ChatGPT, Claude 등)과 어떻게 다른가요?
        a: "LLM은 언어 모델이고 XimTier는 결정 엔진입니다. LLM은 회귀·SHAP·시계열을 직접 계산하지 못하며, 같은 질문에 매번 다른 답을 줍니다. XimTier는 SHAP 기반의 수학적 설명과 재현 가능한 결과를 제공하므로 EU AI Act·한국 AI 기본법 같은 규제를 통과할 수 있습니다."
      - q: Reverse What-If가 정확히 무엇인가요?
        a: "전통적인 What-If는 \"변수 X를 바꾸면 결과는?\" 입니다. Reverse What-If는 반대 방향입니다. \"불량률을 1.2%로 만들려면 변수들을 어떻게 조합해야 하는가?\"처럼 목표 결과를 먼저 정하고, 그 결과를 만들어 내는 변수 조합을 역산합니다."
      - q: 도입까지 얼마나 걸리나요?
        a: "표준 PoC는 4~6주입니다. 1주차에 데이터 연결과 스키마 검증, 2~3주차에 모델 학습과 SHAP 분석, 4주차에 Reverse What-If 시뮬레이션, 5~6주차에 운영 전환과 임원 보고를 진행합니다."
      - q: EU AI Act와 한국 AI 기본법 대응이 정말 가능합니까?
        a: "고위험 AI에 요구되는 \"설명 가능성\"의 핵심은 \"입력 변수가 결과에 얼마나 기여했는지\"를 수학적으로 보일 수 있어야 한다는 것입니다. XimTier는 SHAP 값과 함께 모델 카드, 데이터 출처, 결정 로그를 함께 출력하므로 감사(audit)에 그대로 사용할 수 있습니다."
      - q: 비전문가도 직접 사용할 수 있나요?
        a: "네. 데이터 사이언티스트가 없는 현업 의사결정자(공장장, 병원장, 정책 담당자)가 직접 사용하도록 설계되었습니다. 5단계 워크플로우(데이터 탐색 → 통계 분석 → Reverse What-If → 자동 보고서 → AI Q&A)가 한 화면에서 끝나며, 평균 5분 안에 결론에 도달합니다."
