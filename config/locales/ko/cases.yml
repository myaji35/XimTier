ko:
  cases:
    manufacturing:
      eyebrow: 케이스 · 제조
      slug: manufacturing
      title: 반도체 공정 — 불량률 2.40% → 1.20% 역산
      persona: "김상무 / 반도체 SME 제조본부 임원"
      industry_label: "제조 / Semiconductor"
      dataset: "case_01 · semiconductor_defect_rate.csv · 12,480 rows"
      problem_title: 마주한 문제
      problem_body: >
        라인 평균 불량률이 분기 목표(1.5%)를 0.9%p 초과했습니다. ChatGPT에 6개월치 공정
        로그를 업로드하는 것 자체가 사내 보안 정책 위반이고, 기존 BI 툴(Tableau)은 회귀
        분석만 보여줄 뿐 "어느 변수를 얼마만큼 조절해야 하는가"는 제시하지 못합니다.
      approach_title: XimTier 접근
      approach_body: >
        온프레미스 환경에 데이터를 로딩하고 WhatDataAI가 5개 핵심 변수를 식별합니다.
        Reverse What-If 알고리즘이 목표 불량률(1.20%)에 도달하기 위한 변수별 최적값을
        역산하며, 모든 결과에는 SHAP 기반 수학적 근거가 자동으로 첨부되어 EU AI Act
        통과가 가능합니다.
      outcomes_title: 결과
      outcomes:
        - "불량률 −50% (베이스라인 2.40% → 1.20%)"
        - "처리 시간 0.18s (실시간 슬라이더 응답)"
        - "예상 정확도 92.4% / R² 0.887"
        - "데이터 외부 유출 0건 (100% 온프레미스)"
      variables_title: 5개 공정 변수 역산
      variables:
        - { name: "공정 온도",  from: "215.0°C",   to: "224.9°C",  delta: "+9.9°C" }
        - { name: "주입 압력",  from: "88.0 MPa",  to: "83.7 MPa", delta: "-4.3 MPa" }
        - { name: "라인 속도",  from: "14.0 m/min", to: "8.0 m/min", delta: "-6.0 m/min" }
        - { name: "습도",       from: "52.0%",     to: "49.5%",     delta: "-2.5%" }
        - { name: "원료 등급",  from: "3.0",       to: "4.5",       delta: "+1.5" }
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    hospital:
      eyebrow: 케이스 · 병원
      slug: hospital
      title: 종합병원 — XAI 진단 보조로 EU AI Act 통과
      persona: "이부장 / 상급종합병원 의료정보팀장"
      industry_label: "병원 / Healthcare"
      dataset: "case_02 · imaging_diagnosis_log.csv · 8,200 rows"
      problem_title: 마주한 문제
      problem_body: >
        EU AI Act 2026 시행으로 고위험 AI(진단 보조)는 수학적 근거 제시가 의무화됐고
        한국 식약처도 같은 방향입니다. 기존 딥러닝 모델은 블랙박스라 의료진이
        "왜 이 환자가 고위험으로 분류됐는지"를 환자·보호자에게 설명해야 하는데
        모델이 이를 말해주지 못합니다.
      approach_title: XimTier 접근
      approach_body: >
        병원 내 PACS와 EMR 데이터를 격리 환경에서 통합하고, 진단 결과에 대해 SHAP
        기반 변수별 기여도를 자동 생성합니다. 의료진 인터페이스에는 "이 케이스는 X
        변수의 영향이 0.34만큼 위험도를 높였다"는 형태로 노출되며, 규제 통과 가능
        문서가 자동으로 발급됩니다.
      outcomes_title: 결과
      outcomes:
        - "EU AI Act / 한국 AI 기본법 동시 충족"
        - "의료진 1인당 의사결정 시간 −34%"
        - "환자 대기 시간 평균 18분 단축"
        - "감사·인증 자료 자동 생성 (수동 작업 −80%)"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    public:
      eyebrow: 케이스 · 공공
      slug: public
      title: 광역시 — 청년 실업률 정책 시나리오 시뮬레이션
      persona: "박사무관 / 광역시청 일자리정책과"
      industry_label: "공공 / Public Sector"
      dataset: "case_03 · regional_youth_employment.csv · 60개월 시계열"
      problem_title: 마주한 문제
      problem_body: >
        청년 실업률 목표 4.0%에 도달하기 위해 어떤 정책 변수(인건비 지원율, 창업
        지원금, 직업 훈련 인원, 외부 기업 유치 수)를 얼마나 조정해야 하는지 과거
        정책에 대한 사전 시뮬레이션이 부재해 매번 사후 효과만 확인하는 구조였습니다.
      approach_title: XimTier 접근
      approach_body: >
        지자체 행정 데이터와 통계청 공개 데이터를 결합하고, Reverse What-If로 목표
        실업률 달성을 위한 4개 정책 변수의 최적 조합을 자동 산출합니다. NIPA SaaS
        지원사업을 활용한 파일럿에서 본도입까지 빠르게 전환할 수 있습니다.
      outcomes_title: 결과
      outcomes:
        - "정책 시나리오 비교 시간 −70% (수기 분석 대비)"
        - "정책 의사결정 근거 보고서 자동 생성"
        - "NIPA SaaS 지원사업 적합 검증"
        - "PoC → 본도입 6주 (기존 SI 6개월 대비)"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    smart_city:
      eyebrow: 케이스 · 스마트시티
      slug: smart-city
      title: 스마트시티 — 교통·에너지 통합 시뮬레이션
      persona: "정과장 / 스마트시티 통합운영센터"
      industry_label: "스마트시티 / Smart City"
      dataset: "case_04 · iot_traffic_energy.csv · 240,000 events/day"
      problem_title: 마주한 문제
      problem_body: >
        IoT 센서(교통·전력·환경)가 매일 24만 이벤트를 발생시키지만, 각 도메인별 도구는
        따로 존재해 통합 의사결정이 불가능합니다. "교통 흐름을 5% 개선하면 에너지
        소비가 얼마나 줄어드는가?" 같은 cross-domain 질문에 답할 수 없습니다.
      approach_title: XimTier 접근
      approach_body: >
        IoT 게이트웨이에서 시간 단위로 집계하고, 도시 KPI 변수 8개(교통량·평균 속도·
        피크 전력·CO₂ 등)를 통합 회귀 + Reverse What-If로 분석합니다. AI 에이전트가
        호출 가능한 MCP 표준 인터페이스로 노출하여 자동화 시나리오 확장이 쉽습니다.
      outcomes_title: 결과
      outcomes:
        - "도시 KPI 가시화 (실시간 대시보드)"
        - "교통·에너지 시나리오 비교 시간 −82%"
        - "MCP 인터페이스로 AI 에이전트 통합 가능"
        - "탄소 배출 시뮬레이션 정확도 ±3% 이내"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    finance:
      eyebrow: 케이스 · 금융
      slug: finance
      title: 신용평가 — Adverse Action 사유 자동 첨부
      persona: "조부장 / 시중은행 리스크 모델링 담당"
      industry_label: "금융 / Banking"
      dataset: "case_05 · credit_scoring_log.csv · 96,400 rows"
      problem_title: 마주한 문제
      problem_body: >
        금감원이 2026년부터 AI 기반 신용평가에 대해 "거절 사유 설명"을 사후가 아닌
        모델 단계에서 요구합니다. 기존 부스팅 모델은 블랙박스라 거절된 고객에게
        '왜'를 설명할 수 없어, 분쟁 발생 시 모델 자체를 폐기해야 했습니다.
      approach_title: XimTier 접근
      approach_body: >
        내부망 격리 환경에서 신용·거래·소득 데이터를 통합하고, 각 의사결정에 SHAP
        기반 변수별 기여도를 자동 첨부합니다. Reverse What-If로 "어떤 변수가 얼마나
        개선되면 승인 가능한지" 고객 친화적 가이드까지 생성. 감독당국 제출용 문서
        자동 발급.
      outcomes_title: 결과
      outcomes:
        - "거절 사유 자동 설명 (Adverse Action Notice)"
        - "분쟁 대응 시간 −62%"
        - "이상거래 False Positive −38%"
        - "내부망 격리 운영 (외부 LLM 호출 0건)"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    retail:
      eyebrow: 케이스 · 리테일
      slug: retail
      title: 이커머스 — 가격·프로모션 ROI 사전 시뮬레이션
      persona: "양팀장 / 종합 이커머스 BI 팀장"
      industry_label: "리테일 / E-commerce"
      dataset: "case_06 · sku_price_elasticity.csv · 48,000 SKU × 24개월"
      problem_title: 마주한 문제
      problem_body: >
        SKU 4.8만 개의 가격·프로모션 조정을 매주 결정해야 하는데, "지금 가격을 5%
        내리면 매출은? 재고 회전은? 마진은?"이라는 cross-variable 질문에 답할 도구가
        없습니다. 회귀 분석만으로는 '얼마나' 조정해야 하는지 역산이 불가능했습니다.
      approach_title: XimTier 접근
      approach_body: >
        SKU 단위 가격 탄력성·재고 회전·계절성을 Reverse What-If로 통합. 매출 목표를
        입력하면 가격·프로모션·재고의 최적 조합을 자동 산출합니다. 모든 추천에는
        예상 영향도 + 신뢰구간 + 리스크가 함께 표시되어, 행사 ROI를 사전에 검증할 수
        있습니다.
      outcomes_title: 결과
      outcomes:
        - "가격 변경 영향 사전 시뮬레이션 (24시간 → 12분)"
        - "재고 회전 +18% (전년 동기 대비)"
        - "행사 ROI 사전 예측 정확도 89%"
        - "결품률 −24% 동시 달성"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    logistics:
      eyebrow: 케이스 · 물류
      slug: logistics
      title: 라스트마일 — 배송 리드타임·운임 동시 최적화
      persona: "한대리 / 종합 물류사 SCM 운영팀"
      industry_label: "물류 / Logistics"
      dataset: "case_07 · last_mile_dispatch.csv · 1.2M deliveries"
      problem_title: 마주한 문제
      problem_body: >
        하루 120만 배송 건의 리드타임·운임을 동시에 만족시키는 거점/경로 결정이
        필요한데, 기존 운영팀은 엑셀 + 경험으로 매번 사후 분석만 가능했습니다. "어느
        거점을 늘리면 어느 지역 리드타임이 얼마나 줄어드는가"를 사전에 알 수 없었습니다.
      approach_title: XimTier 접근
      approach_body: >
        주문·재고·차량 위치·트래픽 데이터를 통합하고, 목표 리드타임을 입력하면
        Reverse What-If가 거점 추가/경로 재배치/차량 증차의 최적 조합을 역산합니다.
        각 조합의 운임 비용까지 함께 산출해 의사결정 한 번에 끝납니다.
      outcomes_title: 결과
      outcomes:
        - "평균 배송 리드타임 −1.4시간"
        - "운임 비용 −9.2%"
        - "결품·과재고 동시 감소 (이중 KPI 만족)"
        - "거점 신설 의사결정 시간 6주 → 4일"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    energy:
      eyebrow: 케이스 · 에너지
      slug: energy
      title: 전력 — 첨두 부하 회피 · 재생E 변동 흡수
      persona: "송과장 / 전력거래소 수급운영팀"
      industry_label: "에너지 / Utilities"
      dataset: "case_08 · grid_load_renewable.csv · 시간 단위 · 36개월"
      problem_title: 마주한 문제
      problem_body: >
        재생에너지 비중이 30%를 넘으면서 시간 단위 변동성이 급격히 커졌습니다.
        첨두 부하 시점에 어떤 자원(양수발전·DR·예비력)을 얼마나 가동할지 사전 의사결정이
        필요한데, 기상 + 수요 + 재생E 출력의 cross-variable 시뮬레이션 도구가 부족했습니다.
      approach_title: XimTier 접근
      approach_body: >
        시간 단위로 수요·발전·기상·재생에너지 출력을 통합 회귀합니다. Reverse What-If로
        목표 부하 회피량을 입력하면 가용 자원의 최적 가동 조합을 산출하고, 에너지
        거래 의사결정에 SHAP 기반 근거가 자동 첨부됩니다.
      outcomes_title: 결과
      outcomes:
        - "첨두 부하 회피율 +24%"
        - "재생E 변동 흡수 시나리오 자동 생성"
        - "에너지 거래 의사결정 근거 자동 첨부"
        - "운영 비용 −7.8% (예비력 효율화)"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    education:
      eyebrow: 케이스 · 교육
      slug: education
      title: 에듀테크 — 중도이탈 조기 신호 + 합격률 시나리오
      persona: "유과장 / 자격증 에듀테크 데이터팀"
      industry_label: "교육 / EdTech"
      dataset: "case_09 · learner_activity.csv · 240K learners × 18개월"
      problem_title: 마주한 문제
      problem_body: >
        수험생 24만 명의 학습 로그·평가·환경 데이터가 누적되지만, "어느 학습자가 4주
        내 중도이탈할 위험이 높은가, 그 학습자가 합격하려면 어떤 학습 패턴이
        필요한가"라는 질문에 답할 수 있는 모델이 없었습니다.
      approach_title: XimTier 접근
      approach_body: >
        학습 활동·평가·환경 데이터를 회귀해 중도이탈 조기 신호를 SHAP 기여도와 함께
        탐지합니다. Reverse What-If로 목표 합격률에 필요한 학습 시간·문제풀이 수·복습
        주기 조합을 역산하고, 학부모·학습자에게 설명 가능한 근거를 제공합니다.
      outcomes_title: 결과
      outcomes:
        - "중도이탈 4주 전 조기 신호 (정확도 84%)"
        - "합격률 시나리오 사전 시뮬레이션"
        - "학습자·학부모 설명 가능한 근거"
        - "튜터 1인당 관리 학습자 +40%"
      note: "예시 데이터 — 실제 도입 시 고객 데이터로 파인튜닝됩니다."

    telecom:
      eyebrow: 케이스 · 통신
      slug: telecom
      title: 이동통신 — 이탈 예측 + 요금제 영향 시뮬레이션
      persona: "임차장 / 이동통신사 가입자 분석팀"
      industry_label: "통신 / Telecom"
      dataset: "case_10 · subscriber_usage_log.csv · 4.2M subscribers"
      problem_title: 마주한 문제
      problem_body: >
        가입자 420만 명의 사용 로그·콜드롭·요금제 데이터에서 이탈 위험 시그널을 사전에
