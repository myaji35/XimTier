# XimTier — Kamal 2 Deploy Config
# 서버: Vultr ICN (158.247.235.31), 0012(InsureGraph)와 kamal-proxy 공유
# 접속: http://ximtier.158.247.235.31.nip.io
# 업데이트: 2026-05-12

service: ximtier
# Kamal 2가 registry.server를 자동 결합하므로 username/repo 형태로만.
image: myaji35/ximtier

servers:
  web:
    - 158.247.235.31

ssh:
  user: root

# kamal-proxy를 0012와 공유 (host-based routing) — proxy.host로 분기됨
# Dockerfile은 Thruster를 통해 :80에서 외부 노출 — app_port: 80
proxy:
  host: ximtier.158.247.235.31.nip.io
  app_port: 80
  healthcheck:
    path: /up
    interval: 3
    timeout: 10

# 첫 부팅 전체 대기 — root-level (Kamal 2 스키마, 기본 30s)
# db:prepare(SQLite 4개 DB 생성) + eager_load + Devise/Avo init 합산 ~45s 필요
deploy_timeout: 120
drain_timeout: 30

# GitHub Container Registry
registry:
  server: ghcr.io
  username: myaji35
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    # SMTP — 도메인/계정 결정 후 .kamal/secrets에 채워 활성
    - SMTP_USERNAME
    - SMTP_PASSWORD
    # Sentry/Plausible — 결정 후 채워 활성 (없으면 자동 비활성)
    - SENTRY_DSN
    # Cloudflare Turnstile (FR-4 문의 폼, FR-5 데모 신청) — 미설정 시 view에서 자동 비활성
    - CF_TURNSTILE_SITE_KEY
    - CF_TURNSTILE_SECRET_KEY
    # Slack 알림 (FR-4 문의/FR-5 데모) — 미설정 시 알림 silently skip
    - SLACK_WEBHOOK_URL
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_ENV: production
    PORT: "3000"
    WEB_CONCURRENCY: "1"
    RAILS_SERVE_STATIC_FILES: "true"
    RAILS_LOG_TO_STDOUT: "true"
    # SQLite (Rails 8 기본) — Solid Queue/Cache/Cable 동일 storage 사용
    DB_HOST: ""
    # 도메인 — 정식 도메인 확정 시 ximtier.io 등으로 교체
    APP_HOST: "ximtier.158.247.235.31.nip.io"
    APP_PROTOCOL: "http"
    # SMTP placeholder — 미설정이면 production.rb가 자동 :test 폴백
    SMTP_HOST: ""
    SMTP_PORT: "587"
    SMTP_DOMAIN: "ximtier.158.247.235.31.nip.io"
    SMTP_AUTH: "plain"
    SMTP_STARTTLS: "true"
    # Plausible — 도메인 결정 후 활성
    PLAUSIBLE_DOMAIN: ""

# SQLite + Active Storage volume
volumes:
  - "ximtier_storage:/rails/storage"

asset_path: /rails/public/assets

# 원격 amd64 native 빌드 (QEMU 회피) — Vultr 서버에서 직접 빌드
builder:
  arch: amd64
  remote: ssh://root@158.247.235.31

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole"
